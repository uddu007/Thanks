<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.container{
    background: rgba(0,0,0,0.4);
    padding:40px;
    border-radius:20px;
    max-width:500px;
}

h1{
    font-size:40px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    background:white;
    color:#ff4d6d;
    margin-top:20px;
}

#message{
    margin-top:20px;
    display:none;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">
<h1>Thank You 💖</h1>
<p>This little website is for someone special.</p>

<button onclick="showMessage()">Click Here</button>

<div id="message">
<p>
Dear Friend,  
Your gift means a lot to me. It’s not just the gift, but the thought and care behind it that makes it so special.  
Thank you for being such a wonderful friend. 🌸
</p>
</div>

</div>

<script>
function showMessage(){
    document.getElementById("message").style.display="block";
}
</script>

</body>
</html>
